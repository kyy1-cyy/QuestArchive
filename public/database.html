<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #555;
            margin-bottom: 20px;
        }
        .btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
        }
        .btn:hover { background: #444; }
        .btn-delete { background: #5a1a1a; border-color: #7a2a2a; color: #ff9999; }
        .btn-delete:hover { background: #7a2a2a; color: #fff; }
        .btn-tab { background: transparent; border-color: #444; color: #d4d4d4; }
        .btn-tab:hover { background: #2a2d2e; }
        .btn-tab.active { background: #2a2d2e; border-color: #007acc; color: #fff; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px 10px; border-bottom: 1px solid #555; color: #9cdcfe; font-weight: normal; }
        td { padding: 12px 10px; border-bottom: 1px solid #333; }
        tr:hover { background-color: #2a2d2e; }
        
        /* Checkbox */
        input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #007acc; }

        /* Modal */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #252526;
            border: 1px solid #454545;
            padding: 20px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 6px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #9cdcfe; font-size: 13px; }
        input[type="text"], input[type="password"], textarea {
            width: 100%; box-sizing: border-box;
            background: #3c3c3c; color: #d4d4d4;
            border: 1px solid #555; padding: 8px;
            font-family: inherit; border-radius: 4px;
        }
        input:focus, textarea:focus { outline: none; border-color: #007acc; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        .uploader {
            margin-bottom: 20px;
            border: 1px dashed #555;
            border-radius: 8px;
            padding: 14px;
            background: #1b1b1b;
        }
        .dropzone {
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .dropzone.active {
            border-color: #007acc;
            box-shadow: 0 0 0 1px rgba(0, 122, 204, 0.35);
        }
        .progress-wrap {
            margin-top: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
            background: #101010;
            height: 12px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #007acc;
            transition: width 0.15s linear;
        }
        .muted { color: #808080; font-size: 12px; }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .toolbar { flex-wrap: wrap; gap: 10px; }
            .dropzone { flex-direction: column; align-items: stretch; }
            .dropzone > div:last-child { flex-wrap: wrap; justify-content: flex-end; }
            .dropzone input[type="text"] { width: 100% !important; }
            table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div v-if="!isAuthenticated" class="overlay">
            <div class="modal">
                <div class="form-group">
                    <label>Enter Admin Password to view database</label>
                    <input type="password" v-model="password" @keyup.enter="login" autofocus>
                </div>
                <div class="modal-actions">
                    <button class="btn" @click="login">Unlock</button>
                </div>
            </div>
        </div>

        <template v-else>
            <div class="toolbar">
                <span style="color: #4ec9b0; font-size: 16px;">Database Viewer</span>
                <button class="btn btn-tab" :class="{ active: activeTab === 'games' }" @click="activeTab = 'games'">Games</button>
                <button class="btn btn-tab" :class="{ active: activeTab === 'donations' }" @click="openDonations">Donations</button>
                <button v-if="activeTab === 'games'" class="btn" @click="showAddModal = true">+ Add Game</button>
                <button v-if="activeTab === 'games' && selectedIds.length > 0" class="btn btn-delete" @click="bulkRemove">
                    Remove Selected ({{ selectedIds.length }})
                </button>
                <span style="color: #808080; font-size: 12px; margin-left: auto;">Total Titles: {{ games.length }}</span>
            </div>

            <div v-if="activeTab === 'games'" class="uploader">
                <div class="dropzone" :class="{ active: isDragOver }" @dragenter.prevent="isDragOver = true" @dragover.prevent="isDragOver = true" @dragleave.prevent="isDragOver = false" @drop.prevent="handleDrop">
                    <div>
                        <div style="color:#fff; font-size: 13px; font-weight: 600;">Upload Game File (.zip)</div>
                        <div class="muted">Pick a .zip, we compute an MD5 Hash ID, then upload as &lt;hash&gt;.zip.</div>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="text" v-model="uploadPrefix" placeholder="optional folder (e.g. uploads)" style="width: 220px;">
                        <button class="btn" @click="openFilePicker" :disabled="uploadState.inProgress || hashState.computing">Choose File</button>
                        <button class="btn" @click="startUploadPrepared" :disabled="!preparedFile || !hashState.hash || uploadState.inProgress || hashState.computing">Upload</button>
                        <button v-if="uploadState.inProgress || hashState.computing" class="btn btn-delete" @click="cancelUpload">Cancel</button>
                        <input ref="fileInput" type="file" accept=".zip" style="display:none" @change="handleFileInput">
                    </div>
                </div>

                <div v-if="preparedFileName" style="margin-top: 10px;">
                    <div class="muted">
                        File: <span style="color:#ce9178;">{{ preparedFileName }}</span>
                        <span v-if="hashState.hash"> → Hash ID: <span style="color:#9cdcfe;">{{ hashState.hash }}</span></span>
                        <span v-if="uploadState.key"> → Key: <span style="color:#9cdcfe;">{{ uploadState.key }}</span></span>
                    </div>
                    <div v-if="hashState.hash" style="margin-top: 8px; display:flex; gap:10px; align-items:center; flex-wrap: wrap;">
                        <select class="btn btn-tab active" style="padding: 6px 10px;">
                            <option :value="hashState.hash">{{ hashState.hash }}</option>
                        </select>
                        <button class="btn" @click="copyHash" :disabled="!hashState.hash">Copy Hash</button>
                        <span class="muted" v-if="hashState.computing">Computing MD5…</span>
                        <span class="muted" v-else-if="hashState.copied">Copied</span>
                    </div>
                </div>

                <div v-if="uploadState.inProgress || uploadState.percent === 100" style="margin-top: 10px;">
                    <div class="progress-wrap">
                        <div class="progress-bar" :style="{ width: uploadState.percent + '%' }"></div>
                    </div>
                    <div class="muted" style="margin-top: 8px; display:flex; justify-content: space-between; gap: 10px;">
                        <div>{{ uploadState.percent.toFixed(2) }}% · {{ uploadState.mbps.toFixed(2) }} MB/s · ETA {{ uploadState.eta }}</div>
                        <div v-if="uploadState.message" style="color:#b5cea8;">{{ uploadState.message }}</div>
                    </div>
                </div>

                <div v-if="uploadState.error" style="margin-top: 10px; color:#ff9999; font-size: 12px;">
                    {{ uploadState.error }}
                </div>
            </div>

            <table v-if="activeTab === 'games'">
                <thead>
                    <tr>
                        <th style="width: 40px;">
                            <input type="checkbox" @change="toggleAll" :checked="selectedIds.length === games.length && games.length > 0">
                        </th>
                        <th>Title</th>
                        <th>Image</th>
                        <th>Version</th>
                        <th>Proxy Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-if="games.length === 0">
                        <td colspan="5" style="text-align: center; color: #888; padding: 30px;">Database is empty.</td>
                    </tr>
                    <tr v-for="game in games" :key="game.id">
                        <td>
                            <input type="checkbox" :value="game.id" v-model="selectedIds">
                        </td>
                        <td style="color: #ce9178;">"{{ game.title }}"</td>
                        <td style="color:#9cdcfe; font-size: 12px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            {{ game.thumbnailUrl || '-' }}
                        </td>
                        <td style="color: #b5cea8;">{{ game.version }}</td>
                        <td style="color: #6a9955; font-size: 12px;">Active ({{ (game.hashId && game.hashId.length === 32) ? (game.hashId + '.zip') : (game.title + '.zip') }})</td>
                    </tr>
                </tbody>
            </table>

            <table v-else>
                <thead>
                    <tr>
                        <th>File</th>
                        <th>Timestamp</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-if="donationsLoading">
                        <td colspan="3" style="text-align: center; color: #888; padding: 30px;">Loading donations...</td>
                    </tr>
                    <tr v-else-if="donations.length === 0">
                        <td colspan="3" style="text-align: center; color: #888; padding: 30px;">No donated games found.</td>
                    </tr>
                    <tr v-for="item in donations" :key="item.key">
                        <td style="color:#ce9178;">{{ item.key }}</td>
                        <td style="color:#b5cea8; font-size: 12px;">{{ item.lastModified ? new Date(item.lastModified).toLocaleString() : '-' }}</td>
                        <td style="text-align:right;">
                            <button class="btn" @click="downloadDonation(item.key)">Download</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Add Modal -->
            <div v-if="showAddModal" class="overlay">
                <div class="modal">
                    <h3 style="margin-top:0; color:#fff;">Append to Database</h3>
                    
                    <div class="form-group">
                        <label>Title (Display Name)</label>
                        <input v-model="newGame.title" type="text" placeholder="e.g. Beat Saber">
                    </div>

                    <div class="form-group">
                        <label>Hash ID (MD5)</label>
                        <input v-model="newGame.hashId" type="text" placeholder="32-char md5 hash">
                    </div>
                    
                    <div class="form-group">
                        <label>Version</label>
                        <input v-model="newGame.version" type="text" placeholder="1.0">
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea v-model="newGame.description" rows="3"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Thumbnail URL</label>
                        <input v-model="newGame.thumbnailUrl" type="text" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>Upload Image (png/jpg/jpeg → GitHub)</label>
                        <div class="dropzone" :class="{ active: imageDragOver }"
                             @dragenter.prevent="imageDragOver = true"
                             @dragover.prevent="imageDragOver = true"
                             @dragleave.prevent="imageDragOver = false"
                             @drop.prevent="handleImageDrop"
                             style="justify-content: space-between;">
                            <div>
                                <div style="color:#fff; font-size: 12px; font-weight: 600;">Drag & drop or choose</div>
                                <div class="muted">Uploads to GitHub and auto-fills the URL.</div>
                            </div>
                            <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap; justify-content: flex-end;">
                                <button class="btn" @click="openImagePicker" :disabled="imageState.inProgress">Choose</button>
                                <button class="btn" v-if="newGame.thumbnailUrl" @click="copyImageUrl">Copy URL</button>
                                <input ref="imageInput" type="file" accept=".png,.jpg,.jpeg,image/png,image/jpeg" style="display:none" @change="handleImagePick">
                            </div>
                        </div>
                        <div class="muted" style="margin-top: 8px;" v-if="imageState.message">{{ imageState.message }}</div>
                        <div style="margin-top: 8px; color:#ff9999; font-size: 12px;" v-if="imageState.error">{{ imageState.error }}</div>
                    </div>

                    <div class="modal-actions">
                        <button class="btn" style="background:transparent; border-color:transparent;" @click="showAddModal = false">Cancel</button>
                        <button class="btn" @click="addGame">Save</button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        const { createApp } = Vue

        function _md5RotateLeft(x, c) { return (x << c) | (x >>> (32 - c)); }
        function _md5Add(x, y) { return (x + y) >>> 0; }
        function _md5F(x, y, z) { return (x & y) | (~x & z); }
        function _md5G(x, y, z) { return (x & z) | (y & ~z); }
        function _md5H(x, y, z) { return x ^ y ^ z; }
        function _md5I(x, y, z) { return y ^ (x | ~z); }

        function _md5Round(fn, a, b, c, d, x, s, t) {
            return _md5Add(_md5RotateLeft(_md5Add(_md5Add(a, fn(b, c, d)), _md5Add(x, t)), s), b);
        }

        function _md5BytesToWords(bytes) {
            const words = new Uint32Array(((bytes.length + 3) / 4) | 0);
            for (let i = 0; i < bytes.length; i++) {
                words[i >> 2] |= bytes[i] << ((i % 4) * 8);
            }
            return words;
        }

        function _md5WordsToHex(words) {
            const hex = [];
            for (let i = 0; i < words.length; i++) {
                let w = words[i];
                for (let j = 0; j < 4; j++) {
                    const b = (w >>> (j * 8)) & 0xff;
                    hex.push((b >>> 4).toString(16));
                    hex.push((b & 0x0f).toString(16));
                }
            }
            return hex.join('');
        }

        function md5ArrayBuffer(buffer) {
            const bytes = new Uint8Array(buffer);
            const origLen = bytes.length;
            const withOne = origLen + 1;
            const padLen = (withOne % 64 <= 56) ? (56 - (withOne % 64)) : (56 + (64 - (withOne % 64)));
            const totalLen = withOne + padLen + 8;
            const padded = new Uint8Array(totalLen);
            padded.set(bytes);
            padded[origLen] = 0x80;
            const bitLen = origLen * 8;
            for (let i = 0; i < 8; i++) padded[totalLen - 8 + i] = (bitLen >>> (i * 8)) & 0xff;

            const x = _md5BytesToWords(padded);

            let a0 = 0x67452301;
            let b0 = 0xefcdab89;
            let c0 = 0x98badcfe;
            let d0 = 0x10325476;

            const k = [
                0xd76aa478, 0xe8c7b756, 0x242070db, 0xc1bdceee, 0xf57c0faf, 0x4787c62a, 0xa8304613, 0xfd469501,
                0x698098d8, 0x8b44f7af, 0xffff5bb1, 0x895cd7be, 0x6b901122, 0xfd987193, 0xa679438e, 0x49b40821,
                0xf61e2562, 0xc040b340, 0x265e5a51, 0xe9b6c7aa, 0xd62f105d, 0x02441453, 0xd8a1e681, 0xe7d3fbc8,
                0x21e1cde6, 0xc33707d6, 0xf4d50d87, 0x455a14ed, 0xa9e3e905, 0xfcefa3f8, 0x676f02d9, 0x8d2a4c8a,
                0xfffa3942, 0x8771f681, 0x6d9d6122, 0xfde5380c, 0xa4beea44, 0x4bdecfa9, 0xf6bb4b60, 0xbebfbc70,
                0x289b7ec6, 0xeaa127fa, 0xd4ef3085, 0x04881d05, 0xd9d4d039, 0xe6db99e5, 0x1fa27cf8, 0xc4ac5665,
                0xf4292244, 0x432aff97, 0xab9423a7, 0xfc93a039, 0x655b59c3, 0x8f0ccc92, 0xffeff47d, 0x85845dd1,
                0x6fa87e4f, 0xfe2ce6e0, 0xa3014314, 0x4e0811a1, 0xf7537e82, 0xbd3af235, 0x2ad7d2bb, 0xeb86d391
            ];
            const s = [
                7,12,17,22, 7,12,17,22, 7,12,17,22, 7,12,17,22,
                5,9,14,20, 5,9,14,20, 5,9,14,20, 5,9,14,20,
                4,11,16,23, 4,11,16,23, 4,11,16,23, 4,11,16,23,
                6,10,15,21, 6,10,15,21, 6,10,15,21, 6,10,15,21
            ];

            for (let i = 0; i < x.length; i += 16) {
                let a = a0, b = b0, c = c0, d = d0;
                for (let j = 0; j < 64; j++) {
                    let f, g;
                    if (j < 16) { f = _md5F(b, c, d); g = j; }
                    else if (j < 32) { f = _md5G(b, c, d); g = (5 * j + 1) % 16; }
                    else if (j < 48) { f = _md5H(b, c, d); g = (3 * j + 5) % 16; }
                    else { f = _md5I(b, c, d); g = (7 * j) % 16; }
                    const tmp = d;
                    d = c;
                    c = b;
                    b = _md5Round(() => f, a, b, c, tmp, x[i + g], s[j], k[j]);
                    a = tmp;
                }
                a0 = _md5Add(a0, a);
                b0 = _md5Add(b0, b);
                c0 = _md5Add(c0, c);
                d0 = _md5Add(d0, d);
            }

            return _md5WordsToHex([a0, b0, c0, d0]);
        }

        async function md5File(file) {
            const buf = await file.arrayBuffer();
            return md5ArrayBuffer(buf);
        }

        function md5String(value) {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(String(value ?? ''));
            return md5ArrayBuffer(bytes.buffer);
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.onload = () => {
                    const result = String(reader.result || '');
                    const idx = result.indexOf(',');
                    if (idx === -1) return reject(new Error('Invalid data URL'));
                    resolve(result.slice(idx + 1));
                };
                reader.readAsDataURL(file);
            });
        }

        createApp({
            data() {
                return {
                    isAuthenticated: false,
                    password: '',
                    games: [],
                    activeTab: 'games',
                    donations: [],
                    donationsLoading: false,
                    selectedIds: [],
                    showAddModal: false,
                    newGame: {
                        title: '',
                        hashId: '',
                        version: '',
                        description: '',
                        thumbnailUrl: ''
                    },
                    imageDragOver: false,
                    imageState: {
                        inProgress: false,
                        message: '',
                        error: ''
                    },
                    isDragOver: false,
                    uploadPrefix: '',
                    preparedFile: null,
                    preparedFileName: '',
                    hashState: {
                        computing: false,
                        hash: '',
                        copied: false
                    },
                    uploadState: {
                        inProgress: false,
                        lastFileName: '',
                        key: '',
                        uploadId: '',
                        percent: 0,
                        mbps: 0,
                        eta: '--:--',
                        message: '',
                        error: ''
                    },
                    uploadInternals: {
                        startedAt: 0,
                        totalBytes: 0,
                        uploadedBytes: 0,
                        perPartLoaded: {},
                        parts: [],
                        activeRequests: []
                    }
                }
            },
            mounted() {
                const savedPwd = sessionStorage.getItem('adminPwd');
                if (savedPwd) {
                    this.password = savedPwd;
                    this.login();
                }
            },
            methods: {
                async login() {
                    try {
                        const res = await fetch('/api/database', {
                            headers: { 'password': this.password }
                        });
                        if (res.ok) {
                            this.isAuthenticated = true;
                            sessionStorage.setItem('adminPwd', this.password);
                            this.games = await res.json();
                        } else {
                            alert('Access Denied');
                            this.password = '';
                        }
                    } catch (e) {
                        alert('Error connecting');
                    }
                },
                async openDonations() {
                    this.activeTab = 'donations';
                    await this.fetchDonations();
                },
                async fetchDonations() {
                    this.donationsLoading = true;
                    try {
                        const res = await fetch('/api/donations/list', {
                            headers: { 'password': this.password }
                        });
                        const contentType = (res.headers.get('content-type') || '').toLowerCase();
                        if (!contentType.includes('application/json')) {
                            const text = await res.text();
                            throw new Error(`Unexpected response (${res.status}): ${text.slice(0, 120)}`);
                        }
                        const json = await res.json();
                        if (!res.ok) throw new Error(json.error || `Failed to load donations (${res.status})`);
                        this.donations = Array.isArray(json.items) ? json.items : [];
                    } catch (e) {
                        alert(String(e.message || e));
                        this.donations = [];
                    } finally {
                        this.donationsLoading = false;
                    }
                },
                async downloadDonation(key) {
                    try {
                        const res = await fetch(`/api/donations/download-url?key=${encodeURIComponent(key)}`, {
                            headers: { 'password': this.password }
                        });
                        const contentType = (res.headers.get('content-type') || '').toLowerCase();
                        if (!contentType.includes('application/json')) {
                            const text = await res.text();
                            throw new Error(`Unexpected response (${res.status}): ${text.slice(0, 120)}`);
                        }
                        const json = await res.json();
                        if (!res.ok) throw new Error(json.error || `Failed to create link (${res.status})`);
                        if (!json.url) throw new Error('No URL returned');
                        window.open(json.url, '_blank', 'noopener,noreferrer');
                    } catch (e) {
                        alert(String(e.message || e));
                    }
                },
                openFilePicker() {
                    this.$refs.fileInput.click();
                },
                handleFileInput(e) {
                    const file = e.target.files && e.target.files[0];
                    e.target.value = '';
                    if (file) this.prepareUpload(file);
                },
                handleDrop(e) {
                    this.isDragOver = false;
                    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                    if (file) this.prepareUpload(file);
                },
                resetUploadState() {
                    this.uploadState.inProgress = false;
                    this.uploadState.percent = 0;
                    this.uploadState.mbps = 0;
                    this.uploadState.eta = '--:--';
                    this.uploadState.message = '';
                    this.uploadState.error = '';
                    this.uploadState.key = '';
                    this.uploadState.uploadId = '';
                    this.preparedFile = null;
                    this.preparedFileName = '';
                    this.hashState.computing = false;
                    this.hashState.hash = '';
                    this.hashState.copied = false;
                    this.uploadInternals.startedAt = 0;
                    this.uploadInternals.totalBytes = 0;
                    this.uploadInternals.uploadedBytes = 0;
                    this.uploadInternals.perPartLoaded = {};
                    this.uploadInternals.parts = [];
                    this.uploadInternals.activeRequests.forEach(r => {
                        try { r.abort(); } catch (_) {}
                    });
                    this.uploadInternals.activeRequests = [];
                },
                async copyHash() {
                    try {
                        await navigator.clipboard.writeText(this.hashState.hash);
                        this.hashState.copied = true;
                        setTimeout(() => { this.hashState.copied = false; }, 1200);
                    } catch (e) {
                        alert('Copy failed');
                    }
                },
                openImagePicker() {
                    this.$refs.imageInput.click();
                },
                async handleImagePick(e) {
                    const file = e.target.files && e.target.files[0];
                    e.target.value = '';
                    if (file) await this.uploadImageToGithub(file);
                },
                async handleImageDrop(e) {
                    this.imageDragOver = false;
                    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                    if (file) await this.uploadImageToGithub(file);
                },
                async copyImageUrl() {
                    try {
                        await navigator.clipboard.writeText(this.newGame.thumbnailUrl);
                        this.imageState.message = 'Copied image URL';
                        setTimeout(() => { this.imageState.message = ''; }, 1200);
                    } catch {
                        alert('Copy failed');
                    }
                },
                async uploadImageToGithub(file) {
                    const title = String(this.newGame.title || '').trim();
                    if (!title) {
                        this.imageState.error = 'A Title must be entered before uploading an image';
                        return;
                    }

                    const type = String(file.type || '').toLowerCase();
                    if (!(type === 'image/png' || type === 'image/jpeg' || type === 'image/jpg')) {
                        this.imageState.error = 'Only png/jpg/jpeg allowed';
                        return;
                    }

                    this.imageState.inProgress = true;
                    this.imageState.error = '';
                    this.imageState.message = 'Uploading image...';

                    try {
                        const base64 = await fileToBase64(file);
                        const titleForName = title;
                        const res = await fetch('/api/github/images', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'password': this.password
                            },
                            body: JSON.stringify({
                                title: titleForName,
                                contentType: type,
                                base64
                            })
                        });
                        const json = await res.json();
                        if (!res.ok) throw new Error(json.error || 'Upload failed');
                        if (!json.url) throw new Error('No URL returned');

                        this.newGame.thumbnailUrl = json.url;
                        await this.copyImageUrl();
                        this.imageState.message = 'Image uploaded';
                        setTimeout(() => { this.imageState.message = ''; }, 1200);
                    } catch (e) {
                        this.imageState.error = String(e.message || e);
                        this.imageState.message = '';
                    } finally {
                        this.imageState.inProgress = false;
                    }
                },
                fmtEta(seconds) {
                    if (!Number.isFinite(seconds) || seconds <= 0) return '--:--';
                    const m = Math.floor(seconds / 60);
                    const s = Math.floor(seconds % 60);
                    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                },
                updateProgress() {
                    const total = this.uploadInternals.totalBytes || 0;
                    const uploaded = this.uploadInternals.uploadedBytes || 0;
                    const percent = total ? (uploaded / total) * 100 : 0;
                    this.uploadState.percent = Math.min(100, Math.max(0, percent));

                    const elapsed = (Date.now() - this.uploadInternals.startedAt) / 1000;
                    const bps = elapsed > 0 ? uploaded / elapsed : 0;
                    this.uploadState.mbps = bps / (1024 * 1024);
                    const remaining = Math.max(total - uploaded, 0);
                    const eta = bps > 0 ? remaining / bps : Infinity;
                    this.uploadState.eta = this.fmtEta(eta);
                },
                cancelUpload() {
                    const { key, uploadId } = this.uploadState;
                    this.uploadState.message = 'Cancelling...';
                    this.uploadState.inProgress = false;
                    this.uploadInternals.activeRequests.forEach(r => {
                        try { r.abort(); } catch (_) {}
                    });
                    this.uploadInternals.activeRequests = [];

                    if (key && uploadId) {
                        fetch('/api/uploads/abort', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'password': this.password },
                            body: JSON.stringify({ key, uploadId })
                        }).finally(() => {
                            this.uploadState.message = 'Cancelled';
                        });
                    } else {
                        this.uploadState.message = 'Cancelled';
                    }
                },
                async prepareUpload(file) {
                    if (this.uploadState.inProgress) return;
                    if (!file.name.toLowerCase().endsWith('.zip')) {
                        this.uploadState.error = 'Only .zip files are allowed';
                        return;
                    }

                    this.resetUploadState();
                    this.preparedFile = file;
                    this.preparedFileName = file.name;
                    this.hashState.computing = true;
                    this.hashState.hash = '';
                    this.hashState.copied = false;
                    this.uploadInternals.totalBytes = file.size;
                    this.uploadInternals.startedAt = Date.now();

                    try {
                        const baseName = file.name.replace(/\.zip$/i, '');
                        const hash = md5String(baseName);
                        this.hashState.hash = hash;
                    } catch (e) {
                        this.uploadState.error = String(e.message || e);
                    } finally {
                        this.hashState.computing = false;
                    }
                },
                async startUploadPrepared() {
                    if (!this.preparedFile || !this.hashState.hash) return;
                    const file = this.preparedFile;
                    const hashId = this.hashState.hash;
                    this.uploadState.inProgress = true;
                    this.uploadState.message = 'Initializing...';
                    this.uploadInternals.startedAt = Date.now();
                    this.uploadInternals.totalBytes = file.size;

                    let init;
                    try {
                        const res = await fetch('/api/uploads/init', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'password': this.password },
                            body: JSON.stringify({ filename: file.name, prefix: this.uploadPrefix, hashId })
                        });
                        init = await res.json();
                        if (!res.ok) throw new Error(init.error || 'Init failed');
                    } catch (e) {
                        this.uploadState.inProgress = false;
                        this.uploadState.error = String(e.message || e);
                        return;
                    }

                    this.uploadState.key = init.key;
                    this.uploadState.uploadId = init.uploadId;
                    this.uploadState.message = 'Uploading...';

                    const partSize = 64 * 1024 * 1024;
                    const totalParts = Math.ceil(file.size / partSize);
                    const concurrency = Math.min(4, Math.max(1, (navigator.hardwareConcurrency || 4) / 2));

                    const queue = [];
                    for (let i = 0; i < totalParts; i++) {
                        const partNumber = i + 1;
                        const start = i * partSize;
                        const end = Math.min(start + partSize, file.size);
                        queue.push({ partNumber, blob: file.slice(start, end) });
                    }

                    const workers = Array.from({ length: Math.floor(concurrency) }, () => (async () => {
                        while (queue.length && this.uploadState.inProgress) {
                            const job = queue.shift();
                            if (!job) return;

                            const urlRes = await fetch('/api/uploads/part-url', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'password': this.password },
                                body: JSON.stringify({
                                    key: this.uploadState.key,
                                    uploadId: this.uploadState.uploadId,
                                    partNumber: job.partNumber
                                })
                            });
                            const urlJson = await urlRes.json();
                            if (!urlRes.ok) throw new Error(urlJson.error || 'Failed to sign part');

                            await new Promise((resolve, reject) => {
                                const xhr = new XMLHttpRequest();
                                this.uploadInternals.activeRequests.push(xhr);
                                xhr.open('PUT', urlJson.url, true);
                                xhr.upload.onprogress = (evt) => {
                                    if (!evt.lengthComputable) return;
                                    this.uploadInternals.perPartLoaded[job.partNumber] = evt.loaded;
                                    let sum = 0;
                                    for (const k in this.uploadInternals.perPartLoaded) sum += this.uploadInternals.perPartLoaded[k] || 0;
                                    this.uploadInternals.uploadedBytes = sum;
                                    this.updateProgress();
                                };
                                xhr.onload = () => {
                                    const etag = xhr.getResponseHeader('ETag');
                                    if (xhr.status >= 200 && xhr.status < 300) {
                                        if (!etag) {
                                            reject(new Error('Upload succeeded but ETag header is not readable. Add R2 CORS: ExposeHeaders = ETag'));
                                            return;
                                        }
                                        this.uploadInternals.perPartLoaded[job.partNumber] = job.blob.size;
                                        let sum = 0;
                                        for (const k in this.uploadInternals.perPartLoaded) sum += this.uploadInternals.perPartLoaded[k] || 0;
                                        this.uploadInternals.uploadedBytes = sum;
                                        this.updateProgress();
                                        this.uploadInternals.parts.push({ ETag: etag, PartNumber: job.partNumber });
                                        resolve();
                                    } else {
                                        reject(new Error(`Part ${job.partNumber} failed (${xhr.status})`));
                                    }
                                };
                                xhr.onerror = () => reject(new Error(`Part ${job.partNumber} network error`));
                                xhr.onabort = () => reject(new Error('Upload aborted'));
                                xhr.send(job.blob);
                            });
                        }
                    })());

                    try {
                        await Promise.all(workers);
                    } catch (e) {
                        this.uploadState.inProgress = false;
                        this.uploadState.error = String(e.message || e);
                        this.uploadState.message = '';
                        return;
                    }

                    if (!this.uploadState.inProgress) return;

                    this.uploadState.message = 'Finalizing...';
                    try {
                        const res = await fetch('/api/uploads/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'password': this.password },
                            body: JSON.stringify({
                                key: this.uploadState.key,
                                uploadId: this.uploadState.uploadId,
                                parts: this.uploadInternals.parts
                            })
                        });
                        const json = await res.json();
                        if (!res.ok) throw new Error(json.error || 'Complete failed');

                        this.uploadInternals.uploadedBytes = this.uploadInternals.totalBytes;
                        this.updateProgress();
                        this.uploadState.inProgress = false;
                        this.uploadState.message = 'Done';
                    } catch (e) {
                        this.uploadState.inProgress = false;
                        this.uploadState.error = String(e.message || e);
                        this.uploadState.message = '';
                    }
                },
                toggleAll(e) {
                    if (e.target.checked) {
                        this.selectedIds = this.games.map(g => g.id);
                    } else {
                        this.selectedIds = [];
                    }
                },
                async addGame() {
                    if (!this.newGame.title) return alert('Title is required');
                    if (!this.newGame.hashId || !/^[a-f0-9]{32}$/i.test(String(this.newGame.hashId))) {
                        return alert('Hash ID is required (32-char MD5)');
                    }
                    
                    try {
                        const res = await fetch('/api/database', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'password': this.password
                            },
                            body: JSON.stringify(this.newGame)
                        });
                        if (res.ok) {
                            const added = await res.json();
                            this.games.push(added);
                            this.newGame = { title: '', hashId: '', version: '', description: '', thumbnailUrl: '' };
                            this.showAddModal = false;
                        } else {
                            const err = await res.json();
                            alert(err.error || 'Failed to append');
                        }
                    } catch (e) {
                        console.error(e);
                    }
                },
                async bulkRemove() {
                    if (!confirm(`Are you sure you want to permanently delete ${this.selectedIds.length} game(s) from the database?`)) return;

                    try {
                        const res = await fetch('/api/database/bulk-delete', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'password': this.password
                            },
                            body: JSON.stringify({ ids: this.selectedIds })
                        });
                        
                        if (res.ok) {
                            // Remove them from local state
                            this.games = this.games.filter(g => !this.selectedIds.includes(g.id));
                            this.selectedIds = []; // reset selection
                        } else {
                            alert('Failed to delete games');
                        }
                    } catch (e) {
                        console.error('Error deleting:', e);
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
