openapi: 3.0.0
info:
  title: Quest Archive API
  description: Public and Administrative endpoints for managing VR games and assets.
  version: 1.0.0
servers:
  - url: /api
    description: Base API Path
paths:
  /database:
    get:
      summary: Get all games
      description: Returns the full public list of available games.
      responses:
        '200':
          description: A list of games.
          content:
            application/json:
              schema:
                type: array
    post:
      summary: Add a new game
      description: Adds a new VR game entry. Requires admin authentication.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                hashId:
                  type: string
                thumbnailUrl:
                  type: string
      responses:
        '201':
          description: Game added successfully.
        '401':
          description: Unauthorized.

  /admin/login:
    post:
      summary: Authenticate Administrator
      description: Authenticate using the environmental admin password to receive a session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful.
        '401':
          description: Invalid password.

  /donations/init:
    post:
      summary: Initialize a multipart donation upload
      description: Starts a new donation upload for a ZIP file.
      responses:
        '200':
          description: Upload initialized with `key` and `uploadId`.

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: admin_token
